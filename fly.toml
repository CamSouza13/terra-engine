# Fly.io deployment for the Terra platform (the long-running engine + console + API).
# The engine runs a persistent background loop, so we keep one machine always on
# rather than letting Fly stop it; all durable state lives on the mounted volume.

app = "terra-platform"
primary_region = "iad"

[build]

[env]
  TERRA_HOME = "/data"
  TERRA_AUTH = "1"

[[mounts]]
  source = "terra_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
