<svg viewBox="0 0 1060 660" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Courier New',monospace">
<defs>
  <radialGradient id="bg" cx="50%" cy="42%" r="80%">
    <stop offset="0%" stop-color="#0a151a"/><stop offset="70%" stop-color="#05090c"/><stop offset="100%" stop-color="#010304"/>
  </radialGradient>
  <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
    <path d="M0 0 L8 4.5 L0 9 Z" fill="#4ade80"/>
  </marker>
  <marker id="arc" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
    <path d="M0 0 L8 4.5 L0 9 Z" fill="#22d3ee"/>
  </marker>
</defs>
<rect width="1060" height="660" fill="url(#bg)"/>

<!-- grid -->
<g stroke="#7f9689" stroke-width="0.5" opacity="0.05">
  <line x1="0" y1="0" x2="1060" y2="0"/>
</g>

<style>
  .t{fill:#e9f2ec}
  .m{fill:#8aa093}
  .box{fill:#071016;stroke:#2f6b57;stroke-width:1.4;rx:8}
  .title{font-family:'Space Grotesk',sans-serif;font-weight:600}
  .flow{stroke:#4ade80;stroke-width:2;fill:none}
  .flowc{stroke:#22d3ee;stroke-width:1.6;fill:none;stroke-dasharray:4 5}
  .lbl{font-size:12px;letter-spacing:1px}
  .sub{font-size:10.5px;fill:#9fb3a7}
</style>

<!-- header -->
<text x="40" y="52" class="title" font-size="15" letter-spacing="6" fill="#4ade80">TERRA LABS</text>
<line x1="40" y1="64" x2="128" y2="64" stroke="#4ade80" stroke-width="1"/>
<text x="40" y="92" class="title t" font-size="26">TLK Node — signal chain</text>
<text x="1020" y="52" text-anchor="end" class="m" font-size="11" letter-spacing="2">FIG. 03 / EDGE HARDWARE</text>

<!-- ===== WET SENSORS ===== -->
<text x="40" y="150" class="lbl m">WET SENSORS · OEM</text>
<g>
  <rect class="box" x="40" y="162" width="150" height="34"/><text x="52" y="184" class="t" font-size="13">Dissolved O₂</text>
  <rect class="box" x="40" y="204" width="150" height="34"/><text x="52" y="226" class="t" font-size="13">pH</text>
  <rect class="box" x="40" y="246" width="150" height="34"/><text x="52" y="268" class="t" font-size="13">ORP</text>
  <rect class="box" x="40" y="288" width="150" height="34"/><text x="52" y="310" class="t" font-size="13">Conductivity</text>
  <rect class="box" x="40" y="330" width="150" height="34"/><text x="52" y="352" class="t" font-size="13">Temperature</text>
</g>

<!-- flow sensors -> front end -->
<g class="flow" marker-end="url(#ar)">
  <path d="M190 179 L232 220"/><path d="M190 221 L232 250"/><path d="M190 263 L232 262"/>
  <path d="M190 305 L232 280"/><path d="M190 347 L232 300"/>
</g>

<!-- ===== TLK BOARD group ===== -->
<rect x="222" y="128" width="360" height="300" fill="none" stroke="#7fffd4" stroke-width="1.3" stroke-dasharray="6 6" rx="12" opacity="0.7"/>
<text x="232" y="150" class="lbl" fill="#7fffd4">TERRA TLK BOARD · Raspberry Pi HAT</text>

<!-- analog front end -->
<rect class="box" x="234" y="196" width="160" height="212"/>
<text x="246" y="182" class="lbl m">ANALOG FRONT-END</text>
<text x="248" y="228" class="sub">Potentiostat (DO/ORP)</text>
<text x="248" y="256" class="sub">High-Z buffer (pH)</text>
<text x="248" y="284" class="sub">AC driver (EC)</text>
<text x="248" y="312" class="sub">PT-1000 / 1-wire (temp)</text>
<line x1="248" y1="330" x2="378" y2="330" stroke="#2f6b57" stroke-width="1"/>
<text x="248" y="352" class="sub" fill="#4ade80">Per-channel galvanic</text>
<text x="248" y="368" class="sub" fill="#4ade80">isolation</text>

<!-- ADC + RP2040 -->
<rect class="box" x="410" y="196" width="156" height="96"/>
<text x="422" y="230" class="t" font-size="13">24-bit ADC</text>
<text x="422" y="252" class="sub">ADS1220-class,</text>
<text x="422" y="268" class="sub">precision sampling</text>

<rect class="box" x="410" y="304" width="156" height="104"/>
<text x="422" y="336" class="t" font-size="13">RP2040</text>
<text x="422" y="356" class="sub">co-processor:</text>
<text x="422" y="372" class="sub">deterministic sample,</text>
<text x="422" y="388" class="sub">watchdog, Terra fw</text>

<!-- front end -> adc -->
<path class="flow" marker-end="url(#ar)" d="M394 244 L404 244"/>
<path class="flow" marker-end="url(#ar)" d="M394 356 L404 356"/>
<!-- adc -> mcu internal -->
<path class="flow" marker-end="url(#ar)" d="M488 292 L488 300"/>

<!-- TLK -> Pi over I2C -->
<path class="flow" marker-end="url(#ar)" d="M566 300 L636 300"/>
<text x="574" y="292" class="sub" fill="#4ade80">I²C register map</text>

<!-- ===== RASPBERRY PI group ===== -->
<rect x="628" y="128" width="228" height="300" fill="none" stroke="#22d3ee" stroke-width="1.3" stroke-dasharray="6 6" rx="12" opacity="0.7"/>
<text x="638" y="150" class="lbl" fill="#22d3ee">RASPBERRY PI · Zero 2 W / 4</text>

<rect class="box" x="640" y="180" width="204" height="228" style="stroke:#22d3ee"/>
<text x="654" y="210" class="title t" font-size="15">TERRA ENGINE</text>
<text x="654" y="212" class="sub"> </text>
<text x="654" y="240" class="sub" fill="#e9f2ec">▸ UKF state estimate</text>
<text x="654" y="262" class="sub">   (numpy, no cloud)</text>
<text x="654" y="290" class="sub" fill="#e9f2ec">▸ Monte-Carlo forecast</text>
<text x="654" y="312" class="sub">   calibrated breach risk</text>
<text x="654" y="340" class="sub" fill="#e9f2ec">▸ Controller</text>
<text x="654" y="362" class="sub">   autonomy-gated action</text>
<text x="654" y="392" class="sub" fill="#7fffd4">▸ state persist · self-test</text>

<!-- ===== OUTPUTS ===== -->
<rect class="box" x="892" y="182" width="150" height="86"/>
<text x="904" y="212" class="t" font-size="13">COMMS</text>
<text x="904" y="234" class="sub">Wi-Fi / LoRa,</text>
<text x="904" y="250" class="sub">store-and-forward</text>

<rect class="box" x="892" y="322" width="150" height="86" style="stroke:#fbbf24"/>
<text x="904" y="352" class="t" font-size="13">ACTUATORS</text>
<text x="904" y="374" class="sub">dosing pump,</text>
<text x="904" y="390" class="sub">water exchange</text>

<!-- pi -> outputs -->
<path class="flow" marker-end="url(#ar)" d="M844 250 L888 225"/>
<path class="flow" marker-end="url(#ar)" d="M844 340 L888 360"/>
<text x="852" y="418" class="sub" fill="#fbbf24">recommend → enact (gated)</text>

<!-- inferred callout under Pi -->
<rect x="628" y="452" width="414" height="54" fill="#0a1a12" stroke="#4ade80" stroke-width="1.2" rx="8" opacity="0.9"/>
<text x="644" y="476" class="lbl" fill="#4ade80">INFERRED BY THE ENGINE (not sensed)</text>
<text x="644" y="496" class="sub" fill="#e9f2ec">TAN · NO₂-N · NO₃-N  +  biofilter efficiency (hidden state)</text>

<!-- offline calibration feeding params -->
<rect class="box" x="640" y="548" width="280" height="60" style="stroke:#7fffd4"/>
<text x="656" y="574" class="t" font-size="13">OFFLINE CALIBRATION · NUTS</text>
<text x="656" y="594" class="sub">jax/numpyro on a workstation — never on the node</text>
<path class="flowc" marker-end="url(#arc)" d="M760 548 C760 500 742 460 742 412"/>
<text x="770" y="520" class="sub" fill="#22d3ee">site params</text>

<!-- legend / footer -->
<line x1="40" y1="628" x2="1020" y2="628" stroke="#7f9689" stroke-width="0.5" opacity="0.3"/>
<text x="40" y="648" class="sub m">Buy the electrodes · build &amp; brand everything else — front-end, board, firmware, node image, enclosure.</text>
<text x="1020" y="648" text-anchor="end" class="sub" fill="#5b6b62">© Terra Laboratories · from the mud to the moon</text>
</svg>
