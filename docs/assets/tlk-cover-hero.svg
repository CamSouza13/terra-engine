<path d="M 250 300 A 280 280 0 0 1 640 250" fill="none" stroke="#9dffdf" stroke-width="3" opacity="0.7" filter="url(#rim)"/>
<circle cx="450" cy="440" r="281" fill="none" stroke="#4ade80" stroke-width="1.4" opacity="0.35"/>

