<svg viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="sphere" cx="37%" cy="34%" r="80%">
    <stop offset="0%" stop-color="#57d69b"/>
    <stop offset="26%" stop-color="#2b9a70"/>
    <stop offset="55%" stop-color="#12563f"/>
    <stop offset="82%" stop-color="#083324"/>
    <stop offset="100%" stop-color="#03110b"/>
