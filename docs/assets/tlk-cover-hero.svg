  </filter>
</defs>

<rect width="900" height="900" fill="#04070a"/>

<g fill="#cfe6ff">
  <circle cx="110" cy="150" r="1.8" opacity="0.5"/><circle cx="780" cy="120" r="2.2" opacity="0.5"/>
  <circle cx="835" cy="470" r="1.6" opacity="0.4"/><circle cx="150" cy="700" r="2" opacity="0.45"/>
  <circle cx="720" cy="770" r="1.8" opacity="0.4"/><circle cx="250" cy="120" r="1.4" opacity="0.35"/>
  <circle cx="600" cy="820" r="1.6" opacity="0.35"/><circle cx="70" cy="420" r="1.6" opacity="0.4"/>
</g>

<circle cx="450" cy="440" r="370" fill="url(#halo)"/>
<circle cx="450" cy="440" r="280" fill="url(#sphere)"/>

