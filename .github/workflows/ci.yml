name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy

      - name: Run engine tests
        run: python tests/test_engine.py

      - name: Run ingestion tests
        run: python tests/test_ingest.py

      - name: Run controller tests
        run: python tests/test_control.py

      - name: Run validation tests
        run: python tests/test_validate.py

      - name: Run diagnostics tests
        run: python tests/test_diagnostics.py

      - name: Run CLI tests
        run: python tests/test_cli.py

      - name: Run node-runtime tests
        run: python tests/test_node.py

      - name: Run robustness tests
        run: python tests/test_robust.py

      - name: Run platform tests (accounts, alerts, registry, billing)
        run: python tests/test_platform.py

      - name: Run server auth + API tests
        run: python tests/test_server_auth.py

      - name: Run report + audit tests
        run: python tests/test_reports_audit.py

      - name: Run customer email tests
        run: python tests/test_mailer.py

      - name: Run roles + team tests
        run: python tests/test_roles.py

      - name: Run auth/analytics/hardware tests
        run: python tests/test_authcomplete.py

      - name: Run security-hardening tests
        run: python tests/test_security.py

      - name: Run config-handoff tests
        run: python tests/test_handoff.py

      - name: Smoke-test the demo (no plots)
        run: python scripts/run_demo.py --no-plot

      - name: Smoke-test the CLI
        run: python -m terra.cli validate --domain aquaculture

      - name: Smoke-test the node self-test
        run: python -m terra.cli node --domain aquaculture --selftest

  calibrate:
    name: Bayesian calibration (optional extra)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install with the calibrate extra (jax + numpyro)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[calibrate]"

      - name: Run calibration recovery test
        env:
          JAX_PLATFORMS: cpu
          JAX_ENABLE_X64: "1"
        run: python tests/test_calibrate.py

      - name: Smoke-test the calibration demo
        env:
          JAX_PLATFORMS: cpu
          JAX_ENABLE_X64: "1"
        run: python scripts/run_calibrate.py --hours 12 --warmup 80 --samples 80

  quality:
    name: Quality (ruff, mypy, coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tooling
        run: pip install numpy ruff mypy coverage
      - name: Ruff
        run: ruff check terra tests scripts
      - name: Mypy
        run: mypy terra
      - name: Coverage
        run: bash scripts/coverage.sh
