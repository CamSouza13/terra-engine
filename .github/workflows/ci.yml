name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy

      - name: Run engine tests
        run: python tests/test_engine.py

      - name: Run ingestion tests
        run: python tests/test_ingest.py

      - name: Run controller tests
        run: python tests/test_control.py

      - name: Smoke-test the demo (no plots)
        run: python scripts/run_demo.py --no-plot

  calibrate:
    name: Bayesian calibration (optional extra)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install with the calibrate extra (jax + numpyro)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[calibrate]"

      - name: Run calibration recovery test
        env:
          JAX_PLATFORMS: cpu
          JAX_ENABLE_X64: "1"
        run: python tests/test_calibrate.py

      - name: Smoke-test the calibration demo
        env:
          JAX_PLATFORMS: cpu
          JAX_ENABLE_X64: "1"
        run: python scripts/run_calibrate.py --hours 12 --warmup 80 --samples 80
