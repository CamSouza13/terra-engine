name: Release

# Publish to PyPI when a version tag is pushed, e.g. `git tag v0.4.0 && git push --tags`.
# Uses PyPI Trusted Publishing (OIDC) — configure the trusted publisher for this
# repo at https://pypi.org/manage/project/terra-engine/settings/publishing/
# (no API token/secret required). Alternatively add a PYPI_API_TOKEN secret and
# pass `password: ${{ secrets.PYPI_API_TOKEN }}` to the publish step.

on:
  push:
    tags: ["v*"]

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Show tag vs package version
        run: 'echo "tag=${GITHUB_REF_NAME}  package=v$(python -c ''import terra; print(terra.__version__)'')"'

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
